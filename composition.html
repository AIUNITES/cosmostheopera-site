<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Composition Guide - COSMOS the OPERA</title>
  <meta name="description" content="Complete AI composition and orchestration guide for COSMOS the OPERA - a trance opera with full orchestra, electronic elements, and cosmic soundscapes.">
  <meta name="keywords" content="opera composition, AI music, orchestration guide, trance opera, music composition, opera instrumentation">
  <meta name="author" content="Tom Sans / AIUNITES">
  
  <!-- Open Graph -->
  <meta property="og:title" content="AI Composition Guide - COSMOS the OPERA">
  <meta property="og:description" content="Detailed composition and orchestration guide for creating a trance opera with cosmic themes.">
  <meta property="og:url" content="https://cosmostheopera.com/composition.html">
  <meta property="og:type" content="article">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #12121a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --accent-purple: #9d4edd;
      --accent-cyan: #00d4ff;
      --accent-gold: #ffd700;
      --accent-pink: #ff6b9d;
      --accent-green: #4ade80;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.7;
    }
    
    /* Navigation */
    .nav {
      background: var(--bg-card);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-gold);
      text-decoration: none;
    }
    
    .nav-links {
      display: flex;
      gap: 25px;
    }
    
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s;
    }
    
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent-cyan);
    }
    
    /* Hero */
    .hero {
      padding: 80px 20px;
      text-align: center;
      background: 
        radial-gradient(ellipse at 70% 30%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
        var(--bg-dark);
    }
    
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff, var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .hero-subtitle {
      font-size: 1.2rem;
      color: var(--text-secondary);
      max-width: 700px;
      margin: 0 auto;
    }
    
    /* Content */
    .content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    
    .section {
      margin-bottom: 60px;
    }
    
    .section h2 {
      font-size: 1.8rem;
      margin-bottom: 25px;
      color: var(--accent-gold);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .section h2::before {
      content: "";
      width: 5px;
      height: 30px;
      background: linear-gradient(180deg, var(--accent-purple), var(--accent-cyan));
      border-radius: 3px;
    }
    
    .section h3 {
      font-size: 1.3rem;
      margin: 30px 0 15px;
      color: var(--accent-cyan);
    }
    
    .section p {
      color: var(--text-secondary);
      margin-bottom: 15px;
    }
    
    /* Instrument Grid */
    .instrument-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .instrument-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .instrument-card h4 {
      color: var(--accent-cyan);
      margin-bottom: 15px;
      font-size: 1.1rem;
    }
    
    .instrument-card ul {
      list-style: none;
      padding: 0;
    }
    
    .instrument-card li {
      color: var(--text-secondary);
      padding: 5px 0;
      font-size: 0.95rem;
    }
    
    .instrument-card li::before {
      content: "• ";
      color: var(--accent-gold);
    }
    
    /* Scene Cards */
    .scene-card {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.1), rgba(0, 212, 255, 0.05));
      border-radius: 15px;
      padding: 30px;
      margin: 30px 0;
      border-left: 4px solid var(--accent-purple);
    }
    
    .scene-card h3 {
      color: var(--accent-gold);
      margin-bottom: 10px;
    }
    
    .scene-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }
    
    .scene-meta span {
      background: rgba(255,255,255,0.1);
      padding: 5px 12px;
      border-radius: 20px;
      color: var(--accent-cyan);
    }
    
    .scene-card p {
      color: var(--text-secondary);
    }
    
    /* Musical Elements */
    .musical-element {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 20px;
      margin: 15px 0;
    }
    
    .musical-element h4 {
      color: var(--accent-pink);
      margin-bottom: 10px;
      font-size: 1rem;
    }
    
    /* Code Block */
    .code-block {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 25px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.1);
      margin: 20px 0;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    
    /* Voice Table */
    .voice-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      background: var(--bg-card);
      border-radius: 15px;
      overflow: hidden;
    }
    
    .voice-table th,
    .voice-table td {
      padding: 15px 20px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .voice-table th {
      background: rgba(157, 78, 221, 0.2);
      color: var(--accent-cyan);
      font-weight: 600;
    }
    
    .voice-table tr:last-child td {
      border-bottom: none;
    }
    
    /* Motif Card */
    .motif-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .motif-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .motif-name {
      color: var(--accent-gold);
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .motif-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    /* Performance Note */
    .performance-note {
      background: rgba(255, 215, 0, 0.1);
      border-radius: 10px;
      padding: 20px;
      border-left: 4px solid var(--accent-gold);
      margin: 20px 0;
    }
    
    .performance-note h4 {
      color: var(--accent-gold);
      margin-bottom: 10px;
    }
    
    /* Footer */
    .footer {
      background: var(--bg-card);
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    
    .footer p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .footer a {
      color: var(--accent-purple);
      text-decoration: none;
    }
    
    /* Composer Embed Styles */
    .composer-section {
      background: linear-gradient(180deg, rgba(157,78,221,0.1) 0%, transparent 100%);
      padding: 40px 20px;
      margin: 60px 0;
    }
    
    .composer-section-header {
      text-align: center;
      max-width: 800px;
      margin: 0 auto 30px;
    }
    
    .composer-section-header h2 {
      font-size: 2rem;
      color: var(--accent-gold);
      margin-bottom: 15px;
    }
    
    .composer-section-header p {
      color: var(--text-secondary);
    }
    
    .composer-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    @media (max-width: 1024px) {
      .composer-container { grid-template-columns: 1fr; }
    }
    
    .panel {
      background: var(--bg-card);
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .panel-header {
      background: rgba(157,78,221,0.2);
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-header h3 {
      font-size: 1.1rem;
      color: var(--accent-gold);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .panel-content {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
      max-height: 500px;
    }
    
    .lyrics-input {
      width: 100%;
      min-height: 120px;
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 15px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 20px;
    }
    
    .lyrics-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }
    
    .lyrics-input::placeholder {
      color: var(--text-secondary);
    }
    
    .options-section {
      margin-bottom: 20px;
    }
    
    .options-section h4 {
      font-size: 0.95rem;
      color: var(--accent-cyan);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.85rem;
    }
    
    .option-item:hover {
      border-color: var(--accent-purple);
      background: rgba(157,78,221,0.1);
    }
    
    .option-item.selected {
      border-color: var(--accent-green);
      background: rgba(74,222,128,0.1);
    }
    
    .option-item .icon { font-size: 1.1rem; }
    .option-item .label { flex: 1; }
    
    .option-item .check {
      width: 16px;
      height: 16px;
      border: 2px solid var(--text-secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    
    .option-item.selected .check {
      border-color: var(--accent-green);
      background: var(--accent-green);
    }
    
    .option-item.selected .check::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #000;
      border-radius: 50%;
    }
    
    .select-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }
    
    .select-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .select-group label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    .select-group select {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    .select-group select:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }
    
    .generate-btn {
      width: 100%;
      padding: 14px 25px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }
    
    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(157,78,221,0.4);
    }
    
    .output-actions {
      display: flex;
      gap: 8px;
    }
    
    .output-btn {
      background: rgba(0,212,255,0.2);
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      padding: 6px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    
    .output-btn:hover {
      background: rgba(0,212,255,0.3);
    }
    
    .output-btn.save-btn {
      background: rgba(74,222,128,0.2);
      border-color: var(--accent-green);
      color: var(--accent-green);
    }
    
    .output-actions-wrapper { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .output-actions { display: flex; gap: 8px; }
    .voice-actions { display: flex; gap: 8px; align-items: center; }
    
    /* Voice Selector Checkboxes */
    .voice-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .voice-checkbox { display: flex; align-items: center; gap: 4px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
    .voice-checkbox:hover { border-color: var(--accent-cyan); }
    .voice-checkbox input { display: none; }
    .voice-checkbox input:checked + span { color: var(--accent-green); }
    .voice-checkbox:has(input:checked) { border-color: var(--accent-green); background: rgba(74,222,128,0.1); }
    .loop-btn { background: rgba(157,78,221,0.2); border: 1px solid var(--accent-purple); color: var(--accent-purple); }
    .loop-btn.active { background: rgba(255,215,0,0.2); border-color: var(--accent-gold); color: var(--accent-gold); }
    
    /* Lyrics Input with Mic */
    .lyrics-input-wrapper { position: relative; margin-bottom: 20px; }
    .lyrics-input-wrapper .lyrics-input { margin-bottom: 0; padding-right: 50px; }
    .mic-btn { position: absolute; right: 10px; top: 10px; width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .mic-btn:hover { border-color: var(--accent-cyan); background: rgba(0,212,255,0.1); }
    .mic-btn.recording { border-color: #ff4444; background: rgba(255,68,68,0.2); animation: pulse-recording 1s infinite; }
    .mic-btn .mic-icon { font-size: 1.2rem; }
    @keyframes pulse-recording { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    
    .score-output {
      background: #1a1a24;
      border-radius: 10px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre;
      overflow-x: auto;
      min-height: 350px;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .composer-cta {
      text-align: center;
      margin-top: 30px;
      padding: 25px;
      background: rgba(157,78,221,0.1);
      border-radius: 15px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .composer-cta p {
      color: var(--text-secondary);
      margin-bottom: 15px;
    }
    
    .composer-cta a {
      display: inline-block;
      padding: 12px 25px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      color: #fff;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .composer-cta a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(157,78,221,0.4);
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--bg-card);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
      padding: 15px 25px;
      border-radius: 10px;
      z-index: 2000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .toast.error {
      border-color: var(--accent-pink);
      color: var(--accent-pink);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        gap: 15px;
      }
      
      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
      }
      
      .instrument-grid,
      .motif-grid {
        grid-template-columns: 1fr;
      }
      
      .scene-meta {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
