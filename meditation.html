<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BE FREE — A Meditation | COSMOS the OPERA</title>
  <meta name="description" content="BE FREE — a guided meditation by Tom Sans. Breath, Everything, Free, Realize, Eye, Enter. Quiet your mind and disassociate from pain through Tibetan yoga-inspired practice.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep: #05050a;
      --bg-card: #0c0c16;
      --bg-scene: #10101c;
      --text-glow: #ffffff;
      --text-soft: #c0c0d0;
      --text-dim: #707090;
      --accent-gold: #ffd700;
      --accent-cyan: #00d4ff;
      --accent-pink: #ff6b9d;
      --accent-purple: #9d4edd;
      --accent-green: #4ecdc4;
      --accent-orange: #ff9f43;
    }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg-deep);
      color: var(--text-soft);
      line-height: 1.8;
      min-height: 100vh;
    }
    
    /* Subtle starfield */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 50% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 15% 45%, rgba(255,215,0,0.3), transparent),
        radial-gradient(2px 2px at 85% 15%, rgba(0,212,255,0.2), transparent);
      background-size: 250px 250px;
      animation: drift 120s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-250px); }
    }
    
    /* Breathing animation for meditation */
    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    
    /* AIUNITES Webring */
    .aiunites-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1001; }
    
    /* Navigation */
    .nav {
      position: fixed;
      top: 32px;
      left: 0; right: 0;
      background: rgba(5, 5, 10, 0.92);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .nav-logo {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent-gold);
      text-decoration: none;
      letter-spacing: 2px;
    }
    
    .nav-links { display: flex; gap: 25px; }
    
    .nav-links a {
      font-family: 'Quicksand', sans-serif;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    
    .nav-links a:hover { color: var(--accent-cyan); }
    .nav-links a.active { color: var(--accent-green); }
    
    /* Hero */
    .hero {
      position: relative; z-index: 1;
      padding: 120px 20px 50px;
      text-align: center;
      background: radial-gradient(ellipse at 50% 50%, rgba(78,205,196,0.06) 0%, transparent 60%);
    }
    .hero h1 {
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--accent-green);
      text-shadow: 0 0 60px rgba(78,205,196,0.2);
      margin-bottom: 10px;
    }
    .hero .subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 300;
      font-style: italic;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    .hero .byline {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    /* Breathing circle */
    .breath-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(78,205,196,0.2);
      margin: 40px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: breathe 6s ease-in-out infinite;
      background: radial-gradient(circle, rgba(78,205,196,0.05), transparent);
    }
    .breath-circle span {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-green);
      opacity: 0.6;
    }

    /* Main Content */
    .content {
      position: relative; z-index: 1;
      max-width: 750px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    
    /* About Section */
    .about {
      margin-bottom: 50px;
      padding: 30px;
      background: rgba(12,12,22,0.6);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 12px;
    }
    .about h2 {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 15px;
      text-align: center;
    }
    .about p {
      font-size: 1.05rem;
      line-height: 2;
      color: var(--text-soft);
      margin-bottom: 12px;
    }
    .about p:last-child { margin-bottom: 0; }
    
    /* Meditation Text */
    .meditation-block {
      margin-bottom: 50px;
      padding: 40px 35px;
      background: rgba(16,16,28,0.6);
      border: 1px solid rgba(78,205,196,0.08);
      border-radius: 16px;
      position: relative;
    }
    .meditation-block::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(78,205,196,0.3), transparent);
    }
    
    .meditation-header {
      text-align: center;
      margin-bottom: 35px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .meditation-label {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent-green);
    }
    .meditation-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--text-glow);
      letter-spacing: 0.08em;
      margin-top: 8px;
    }
    
    .meditation-text {
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      font-weight: 300;
      line-height: 2.4;
      color: var(--text-soft);
    }
    
    .meditation-text .line {
      display: block;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    .meditation-text .line:hover { opacity: 1; color: var(--text-glow); }
    
    .meditation-text .emphasis {
      font-weight: 400;
      color: var(--text-glow);
    }
    
    .meditation-text .gentle {
      color: var(--accent-green);
      font-style: italic;
    }
    
    .meditation-text .mantra {
      font-size: 1.1em;
      font-weight: 400;
      color: var(--accent-green);
      letter-spacing: 0.05em;
    }
    
    .meditation-text .sound {
      font-style: italic;
      color: var(--accent-cyan);
      letter-spacing: 0.1em;
    }
    
    .meditation-text .transcend {
      font-size: 1.15em;
      color: var(--text-glow);
      letter-spacing: 0.05em;
    }
    
    .stanza-break { height: 1.5em; }
    
    /* BE FREE Acronym */
    .acronym-block {
      margin: 50px 0;
      padding: 40px 35px;
      background: rgba(16,16,28,0.8);
      border: 1px solid rgba(255,215,0,0.1);
      border-radius: 16px;
      text-align: center;
    }
    .acronym-block h2 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      color: var(--accent-gold);
      text-shadow: 0 0 40px rgba(255,215,0,0.15);
      margin-bottom: 20px;
    }
    .acronym-full {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-bottom: 30px;
    }
    .acronym-full .letter {
      color: var(--accent-gold);
      font-weight: 600;
    }
    
    .acronym-lines {
      text-align: left;
      max-width: 500px;
      margin: 0 auto;
    }
    .acronym-line {
      display: flex;
      gap: 15px;
      margin-bottom: 8px;
      font-size: 1.1rem;
      line-height: 1.8;
    }
    .acronym-line .letter-col {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      color: var(--accent-gold);
      min-width: 25px;
      font-size: 1.2rem;
    }
    .acronym-line .desc {
      color: var(--text-soft);
      font-style: italic;
    }
    
    /* Dividers */
    .divider {
      text-align: center;
      margin: 40px auto;
      color: var(--text-dim);
      font-size: 1.2rem;
      letter-spacing: 0.8em;
      opacity: 0.2;
    }
    
    /* Practice Notes */
    .practice-notes {
      padding: 30px;
      background: rgba(12,12,22,0.6);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 12px;
      margin-top: 50px;
    }
    .practice-notes h2 {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 15px;
      text-align: center;
    }
    .practice-notes p {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .practice-notes p:last-child { margin-bottom: 0; }
    .practice-notes .highlight {
      color: var(--accent-green);
    }
    
    /* Footer */
    .footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 60px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .footer p {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 2px;
    }
    .footer a { color: var(--accent-purple); text-decoration: none; }
    .copyright {
      margin-top: 20px;
      font-size: 0.72rem;
      color: var(--text-dim);
      opacity: 0.6;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .nav { flex-direction: column; gap: 12px; padding: 12px 20px; }
      .nav-links { flex-wrap: wrap; justify-content: center; gap: 12px; }
      .hero { padding: 240px 20px 40px; }
      .meditation-block { padding: 25px 20px; }
      .acronym-block { padding: 30px 20px; }
      .breath-circle { width: 90px; height: 90px; }
    }
    @media (max-width: 400px) {
      .hero { padding: 270px 20px 40px; }
    }
  </style>
