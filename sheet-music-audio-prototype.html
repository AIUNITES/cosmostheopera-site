  <title>Act I Part 1: Do You See - Sheet Music with Audio | COSMOS the OPERA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-dark: #0a0a0f; --bg-card: #12121a; --bg-score: #1a1a24; --text-primary: #fff; --text-secondary: #a0a0b0; --accent-purple: #9d4edd; --accent-cyan: #00d4ff; --accent-gold: #ffd700; --accent-pink: #ff6b9d; --accent-green: #00ff88; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-dark); color: var(--text-primary); line-height: 1.6; }
    .nav { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 1.5rem; font-weight: 800; color: var(--accent-gold); text-decoration: none; }
    .act-header { padding: 40px 20px; text-align: center; background: linear-gradient(135deg, rgba(157,78,221,0.15), rgba(0,212,255,0.1)); }
    .act-header h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); margin-bottom: 10px; background: linear-gradient(135deg, #fff, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .act-header p { color: var(--text-secondary); }
    
    /* Floating Controls */
    .floating-controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(18,18,26,0.95); border: 1px solid rgba(0,255,136,0.3); border-radius: 30px; padding: 12px 25px; display: flex; align-items: center; gap: 15px; z-index: 1000; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .floating-controls.hidden { display: none; }
    .now-playing-mini { display: flex; align-items: center; gap: 10px; min-width: 180px; }
    .now-playing-note-mini { font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: bold; color: var(--accent-green); min-width: 45px; }
    .now-playing-text-mini { color: var(--accent-cyan); font-style: italic; font-size: 0.9rem; }
    .floating-progress { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .floating-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); width: 0%; transition: width 0.1s linear; }
    
    .audio-banner { background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,212,255,0.1)); border: 1px solid rgba(0,255,136,0.3); border-radius: 10px; padding: 15px 20px; margin: 20px auto; max-width: 1100px; display: flex; align-items: center; gap: 15px; }
    .audio-banner-icon { font-size: 2rem; }
    .audio-banner-text { flex: 1; }
    .audio-banner-text h3 { color: var(--accent-green); font-size: 1rem; margin-bottom: 5px; }
    .audio-banner-text p { color: var(--text-secondary); font-size: 0.85rem; }
    .audio-init-btn { background: var(--accent-green); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .audio-init-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,255,136,0.4); }
    .audio-init-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    .audio-init-btn.ready { background: var(--accent-cyan); }
    
    .content { max-width: 1100px; margin: 0 auto; padding: 40px 20px; padding-bottom: 120px; }
    .score-section { margin-bottom: 40px; }
    .score-header { background: linear-gradient(135deg, rgba(157,78,221,0.2), rgba(0,212,255,0.1)); border-radius: 10px 10px 0 0; padding: 20px; border-left: 4px solid var(--accent-purple); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
    .score-header h3 { color: var(--accent-gold); font-size: 1.3rem; }
    .score-meta { display: flex; gap: 15px; flex-wrap: wrap; font-size: 0.85rem; color: var(--text-secondary); }
    .score-meta span { background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 15px; }
    
    .play-btn, .stop-btn { background: rgba(0,255,136,0.2); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .play-btn.playing { background: rgba(255,107,157,0.2); border-color: var(--accent-pink); color: var(--accent-pink); }
    .stop-btn { background: rgba(255,107,157,0.2); border-color: var(--accent-pink); color: var(--accent-pink); }
    
    .score-block { background: var(--bg-score); border-radius: 0 0 10px 10px; padding: 20px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.05); }
    
    .measure-block { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.3; color: var(--text-secondary); white-space: pre; padding: 10px; border-radius: 8px; transition: all 0.3s; scroll-margin-top: 200px; }
    .measure-block.active { background: rgba(0,255,136,0.1); border-left: 4px solid var(--accent-green); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
    .measure-block.climax-section { background: rgba(255,107,157,0.05); }
    .measure-block.climax-section.active { background: rgba(255,107,157,0.15); border-left-color: var(--accent-pink); box-shadow: 0 0 30px rgba(255,107,157,0.3); }
    
    .score-annotation { background: rgba(255,215,0,0.1); border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 0.85rem; color: var(--text-secondary); border-left: 3px solid var(--accent-gold); }
    .footer { background: var(--bg-card); padding: 30px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); font-size: 0.85rem; }
    
    @media (max-width: 768px) { 
      /* Mobile Score - Larger and readable */
      .measure-block { font-size: 14px; line-height: 1.5; padding: 15px; } 
      .score-block { padding: 15px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      
      /* Floating controls */
      .floating-controls { flex-wrap: wrap; justify-content: center; padding: 10px 15px; bottom: 10px; width: 95%; } 
      
      /* Larger touch targets */
      .play-btn, .stop-btn { padding: 12px 20px; font-size: 1rem; }
    }
  </style>
